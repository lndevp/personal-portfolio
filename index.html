<!-- Website: https://lndevp.github.io/personal-portfolio/ -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Terrence Yang's portfolio: code, robotics, marketing work, tutoring, and projects from Richmond Hill to the University of Toronto.">
  <title>Terrence Yang | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&amp;family=DM+Serif+Display&amp;display=swap" rel="stylesheet">
  <style>
    /* ================================================================
       Design tokens
       ================================================================ */
    :root {
      --color-bg: #080810;
      --color-surface: #11111f;
      --color-accent: #6c8eff;
      --color-accent-warm: #f2bd69;
      --color-text: #f0f0f5;
      --color-muted: #a7abcd;
      --color-nav: rgba(8, 8, 16, 0.92);
      --color-accent-soft: rgba(108, 142, 255, 0.3);
      --color-accent-border: rgba(108, 142, 255, 0.4);
      --color-card-border: rgba(255, 255, 255, 0.06);
      --color-field-border: rgba(255, 255, 255, 0.15);
      --color-shadow: rgba(0, 0, 0, 0.5);
      --color-particle: rgba(108, 142, 255, 0.6);
      --color-particle-line: rgba(108, 142, 255, 0.15);

      --font-display: "DM Serif Display", Georgia, serif;
      --font-body: "DM Sans", Arial, sans-serif;
      --font-size-label: 0.6875rem;
      --font-size-nav: 0.8125rem;
      --font-size-tag: 0.75rem;
      --font-size-body: 1rem;
      --font-size-lead: clamp(1.05rem, 1.8vw, 1.25rem);
      --font-size-card: 1.375rem;
      --font-size-year: clamp(1.2rem, 3vw, 2rem);
      --font-size-heading: clamp(3rem, 10vw, 8rem);
      --font-size-page: clamp(3.2rem, 8vw, 7rem);
      --font-size-subheading: clamp(1.8rem, 4vw, 3rem);
      --line-height-body: 1.75;
      --line-height-display: 0.86;
      --letter-spacing-label: 0.15em;
      --letter-spacing-tag: 0.08em;

      --space-unit: 0.25rem;
      --space-1: calc(var(--space-unit) * 1);
      --space-2: calc(var(--space-unit) * 2);
      --space-3: calc(var(--space-unit) * 3);
      --space-4: calc(var(--space-unit) * 4);
      --space-5: calc(var(--space-unit) * 5);
      --space-6: calc(var(--space-unit) * 6);
      --space-8: calc(var(--space-unit) * 8);
      --space-10: calc(var(--space-unit) * 10);
      --space-12: calc(var(--space-unit) * 12);
      --space-16: calc(var(--space-unit) * 16);
      --space-20: calc(var(--space-unit) * 20);
      --space-24: calc(var(--space-unit) * 24);
      --space-28: calc(var(--space-unit) * 28);
      --space-32: calc(var(--space-unit) * 32);

      --content-width: 75rem;
      --copy-width: 35rem;
      --nav-height: 5rem;
      --hero-rule-width: 3.75rem;
      --timeline-year-width: 6rem;
      --timeline-rail-width: 0.125rem;
      --hamburger-width: 1.125rem;
      --hamburger-line-height: 0.0625rem;
      --particle-radius: 1.5;
      --particle-count: 120;
      --particle-link-distance: 120;
      --particle-mouse-distance: 150;
      --particle-speed-limit: 1.2;
      --particle-drift: 0.22;
      --particle-repulse: 0.018;
      --particle-line-width: 0.4;
      --particle-clear-x: 0.34;
      --particle-clear-y: 0.32;
      --particle-spawn-attempts: 8;
      --tilt-perspective: 900;
      --tilt-rotation: 8;
      --copy-feedback-duration: 1500;
      --nav-scroll-threshold: 80;

      --radius-tag: 0.1875rem;
      --radius-card: 0.5rem;
      --radius-pill: 999px;
      --radius-round: 50%;
      --blob-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
      --border-thin: 0.0625rem;
      --shadow-card: 0 1.25rem 3.75rem var(--color-shadow);

      --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-in: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-out-expo: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
      --duration-fast: 200ms;
      --duration-base: 300ms;
      --duration-slow: 500ms;
      --duration-menu: 400ms;
      --duration-morph: 10s;
      --stagger-step: 60ms;
      --translate-exit: -1rem;
      --translate-enter: 1.25rem;
      --translate-reveal: 1.875rem;
      --translate-card: -0.5rem;
      --scale-pressed: 0.98;
      --focus-offset: 0.25rem;
    }

    /* ================================================================
       Reset and document
       ================================================================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      background: var(--color-bg);
      color-scheme: dark;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-width: 20rem;
      background:
        radial-gradient(circle at 18% 18%, rgba(108, 142, 255, 0.13), transparent 22rem),
        radial-gradient(circle at 80% 70%, rgba(242, 189, 105, 0.09), transparent 28rem),
        var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: var(--font-size-body);
      line-height: var(--line-height-body);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    body.menu-open {
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    button {
      color: inherit;
    }

    :focus-visible {
      outline: var(--border-thin) solid var(--color-accent);
      outline-offset: var(--focus-offset);
    }

    ::selection {
      background: var(--color-accent);
      color: var(--color-bg);
    }

    .skip-link {
      position: fixed;
      z-index: 200;
      top: var(--space-4);
      left: var(--space-4);
      padding: var(--space-3) var(--space-5);
      border: var(--border-thin) solid var(--color-accent);
      border-radius: var(--radius-pill);
      background: var(--color-bg);
      color: var(--color-text);
      transform: translateY(calc(-100% - var(--space-8)));
      transition: transform var(--duration-fast) var(--ease-standard);
    }

    .skip-link:focus-visible {
      transform: translateY(0);
    }

    .ambient {
      position: fixed;
      z-index: 0;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .ambient::before,
    .ambient::after {
      position: absolute;
      width: 32rem;
      height: 32rem;
      border-radius: var(--radius-round);
      content: "";
      filter: blur(5rem);
      opacity: 0.24;
      transform: translate3d(0, 0, 0);
      animation: ambientDrift 16s var(--ease-in-out) infinite alternate;
    }

    .ambient::before {
      top: -10rem;
      right: -8rem;
      background: var(--color-accent);
    }

    .ambient::after {
      bottom: -12rem;
      left: -10rem;
      background: var(--color-accent-warm);
      animation-delay: -6s;
    }

    @keyframes ambientDrift {
      from { transform: translate3d(-1rem, 0, 0) scale(0.95); }
      to { transform: translate3d(1.5rem, -1rem, 0) scale(1.08); }
    }

    /* ================================================================
       Navigation
       ================================================================ */
    .site-nav {
      position: fixed;
      z-index: 100;
      top: 0;
      width: 100%;
      height: var(--nav-height);
      background: transparent;
      backdrop-filter: none;
      transition: background var(--duration-base) var(--ease-standard),
        backdrop-filter var(--duration-base) var(--ease-standard);
    }

    .site-nav.nav--filled {
      background: var(--color-nav);
      backdrop-filter: blur(var(--space-4));
    }

    .nav-shell {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 100%;
      margin: 0 auto;
      padding: 0 var(--space-6);
    }

    .nav-monogram {
      position: relative;
      z-index: 102;
      color: var(--color-accent);
      font-family: var(--font-display);
      font-size: 1.375rem;
      line-height: 1;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: var(--space-8);
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .nav-link {
      color: var(--color-muted);
      font-size: var(--font-size-nav);
      letter-spacing: var(--letter-spacing-label);
      text-transform: uppercase;
      transition: color var(--duration-fast) var(--ease-standard);
    }

    .nav-link:hover,
    .nav-link:focus-visible {
      color: var(--color-text);
    }

    .nav-link[aria-current="page"] {
      color: var(--color-accent);
    }

    .menu-toggle {
      display: none;
      position: relative;
      z-index: 102;
      width: var(--space-8);
      height: var(--space-8);
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .menu-toggle-line {
      position: absolute;
      left: calc(50% - (var(--hamburger-width) / 2));
      display: block;
      width: var(--hamburger-width);
      height: var(--hamburger-line-height);
      background: var(--color-text);
      transition: transform var(--duration-base) var(--ease-out-expo),
        opacity var(--duration-fast) var(--ease-standard);
    }

    .menu-toggle-line:nth-child(1) {
      transform: translateY(calc(var(--space-2) * -1));
    }

    .menu-toggle-line:nth-child(3) {
      transform: translateY(var(--space-2));
    }

    .menu-toggle[aria-expanded="true"] .menu-toggle-line:nth-child(1) {
      transform: rotate(45deg);
    }

    .menu-toggle[aria-expanded="true"] .menu-toggle-line:nth-child(2) {
      opacity: 0;
    }

    .menu-toggle[aria-expanded="true"] .menu-toggle-line:nth-child(3) {
      transform: rotate(-45deg);
    }

    /* ================================================================
       View transitions and page shell
       ================================================================ */
    .view {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      opacity: 1;
      transform: translateY(0);
    }

    .view--exit {
      opacity: 0;
      transform: translateY(var(--translate-exit));
      transition: opacity var(--duration-fast) var(--ease-in),
        transform var(--duration-fast) var(--ease-in);
    }

    .view--enter {
      opacity: 0;
      transform: translateY(var(--translate-enter));
    }

    .view--active {
      opacity: 1;
      transform: translateY(0);
      transition: opacity var(--duration-base) var(--ease-out-expo),
        transform var(--duration-base) var(--ease-out-expo);
    }

    .page {
      width: min(100%, var(--content-width));
      min-height: 100vh;
      margin: 0 auto;
      padding: calc(var(--nav-height) + var(--space-20)) var(--space-6) var(--space-24);
    }

    .page-header {
      margin-bottom: var(--space-20);
    }

    .eyebrow {
      margin: 0 0 var(--space-4);
      color: var(--color-accent);
      font-size: var(--font-size-label);
      letter-spacing: var(--letter-spacing-label);
      text-transform: uppercase;
    }

    .page-title {
      max-width: 9ch;
      margin: 0;
      font-family: var(--font-display);
      font-size: var(--font-size-page);
      font-weight: 400;
      line-height: 0.95;
    }

    .page-lead {
      max-width: var(--copy-width);
      margin: var(--space-6) 0 0;
      color: var(--color-muted);
      font-size: var(--font-size-lead);
    }

    /* ================================================================
       Shared controls and tags
       ================================================================ */
    .ghost-button {
      position: relative;
      isolation: isolate;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 0.875rem 2.25rem;
      border: var(--border-thin) solid var(--color-accent);
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--color-accent);
      cursor: pointer;
      letter-spacing: var(--letter-spacing-tag);
      text-align: center;
      transition: color var(--duration-base) var(--ease-out-expo),
        border-color var(--duration-base) var(--ease-standard),
        transform var(--duration-fast) var(--ease-standard);
    }

    .ghost-button::before {
      position: absolute;
      z-index: -1;
      inset: 0;
      background: var(--color-accent);
      content: "";
      transform: scaleX(0);
      transform-origin: left;
      transition: transform var(--duration-base) var(--ease-out-expo);
    }

    .ghost-button:hover,
    .ghost-button:focus-visible {
      color: var(--color-bg);
    }

    .ghost-button:hover::before,
    .ghost-button:focus-visible::before {
      transform: scaleX(1);
    }

    .ghost-button:active {
      transform: scale(var(--scale-pressed));
    }

    .ghost-button--quiet {
      border-color: var(--color-field-border);
      background: rgba(255, 255, 255, 0.035);
      color: var(--color-text);
    }

    .ghost-button--quiet::before {
      background: var(--color-text);
    }

    .ghost-button--quiet:hover,
    .ghost-button--quiet:focus-visible {
      border-color: var(--color-text);
      color: var(--color-bg);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .tag {
      display: inline-flex;
      padding: var(--space-1) var(--space-3);
      border: var(--border-thin) solid var(--color-accent-soft);
      border-radius: var(--radius-tag);
      color: var(--color-muted);
      font-size: var(--font-size-tag);
      letter-spacing: var(--letter-spacing-tag);
    }

    /* ================================================================
       Home view
       ================================================================ */
    .hero {
      position: relative;
      display: grid;
      min-height: 100vh;
      place-items: center;
      overflow: hidden;
    }

    .hero-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      width: min(100%, var(--content-width));
      padding: var(--nav-height) var(--space-6);
      text-align: center;
      pointer-events: none;
    }

    .hero-content .eyebrow {
      margin-bottom: var(--space-8);
    }

    .hero-title {
      max-width: 10ch;
      margin: 0 auto;
      font-family: var(--font-display);
      font-size: var(--font-size-heading);
      font-weight: 400;
      line-height: var(--line-height-display);
      text-wrap: balance;
    }

    .hero-note {
      max-width: 36rem;
      margin: var(--space-6) auto 0;
      color: var(--color-muted);
      font-size: var(--font-size-lead);
      line-height: 1.6;
      text-wrap: balance;
    }

    .hero-rule {
      width: var(--hero-rule-width);
      height: var(--border-thin);
      margin: var(--space-6) auto;
      border: 0;
      background: var(--color-accent);
    }

    .hero-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: var(--space-3);
      pointer-events: auto;
    }

    /* ================================================================
       About view
       ================================================================ */
    .about-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-20);
      align-items: center;
    }

    .about-visual,
    .about-copy {
      opacity: 0;
      will-change: transform, opacity;
    }

    .about-visual {
      transform: translateX(calc(var(--translate-reveal) * -1));
    }

    .about-copy {
      transform: translateX(var(--translate-reveal));
    }

    .about-visual.is-visible,
    .about-copy.is-visible {
      opacity: 1;
      transform: translateX(0);
      transition: opacity var(--duration-slow) var(--ease-out-expo),
        transform var(--duration-slow) var(--ease-out-expo);
    }

    .about-blob {
      display: grid;
      width: 100%;
      aspect-ratio: 1;
      place-items: center;
      border: var(--border-thin) solid var(--color-accent);
      border-radius: var(--blob-radius);
      background: var(--color-surface);
      animation: morph var(--duration-morph) var(--ease-standard) infinite alternate;
    }

    .about-initial {
      color: var(--color-accent);
      font-family: var(--font-display);
      font-size: var(--font-size-page);
    }

    @keyframes morph {
      0% { transform: rotate(-2deg) scale(0.98); }
      50% { transform: rotate(2deg) scale(1); }
      100% { transform: rotate(-1deg) scale(0.96); }
    }

    .about-heading {
      margin: 0 0 var(--space-8);
      font-family: var(--font-display);
      font-size: var(--font-size-subheading);
      font-weight: 400;
      line-height: 1.1;
    }

    .about-copy p {
      margin: 0 0 var(--space-5);
      color: var(--color-muted);
    }

    .about-copy p:first-of-type {
      color: var(--color-text);
      font-size: var(--font-size-lead);
    }

    .about-skills-label {
      margin: var(--space-8) 0 var(--space-3);
      color: var(--color-text);
      font-size: var(--font-size-label);
      letter-spacing: var(--letter-spacing-label);
      text-transform: uppercase;
    }

    /* ================================================================
       Work view
       ================================================================ */
    .timeline {
      position: relative;
      margin-left: var(--timeline-year-width);
      padding-left: var(--space-12);
    }

    .timeline::before {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: var(--timeline-rail-width);
      background: var(--color-accent);
      content: "";
      opacity: 0.75;
    }

    .timeline-entry {
      position: relative;
      min-height: 10rem;
      padding: 0 0 var(--space-16) var(--space-8);
      opacity: 0;
      transform: translateX(var(--translate-enter));
    }

    .timeline-entry.is-visible {
      opacity: 1;
      transform: translateX(0);
      transition: opacity var(--duration-slow) var(--ease-out-expo),
        transform var(--duration-slow) var(--ease-out-expo);
    }

    .timeline-entry::before {
      position: absolute;
      top: var(--space-2);
      left: calc((var(--space-8) + (var(--timeline-rail-width) / 2)) * -1);
      width: var(--space-3);
      height: var(--space-3);
      border: var(--border-thin) solid var(--color-accent);
      border-radius: var(--radius-round);
      background: var(--color-bg);
      content: "";
      transform: translateX(-50%);
    }

    .timeline-year {
      position: absolute;
      top: calc(var(--space-2) * -1);
      right: calc(100% + var(--space-12) + var(--space-8));
      width: var(--timeline-year-width);
      color: var(--color-accent);
      font-family: var(--font-display);
      font-size: var(--font-size-year);
      line-height: 1;
      opacity: 0.4;
      text-align: right;
    }

    .timeline-role {
      margin: 0;
      font-size: var(--font-size-lead);
      font-weight: 600;
    }

    .timeline-company {
      margin: var(--space-1) 0 var(--space-4);
      color: var(--color-muted);
      font-size: var(--font-size-nav);
      letter-spacing: var(--letter-spacing-tag);
      text-transform: uppercase;
    }

    .timeline-impact {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .timeline-impact li {
      max-width: var(--copy-width);
      margin-bottom: var(--space-2);
      color: var(--color-muted);
    }

    .timeline-impact li::before {
      margin-right: var(--space-3);
      color: var(--color-accent);
      content: "\2192";
    }

    /* ================================================================
       Projects view
       ================================================================ */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(20rem, 100%), 1fr));
      gap: var(--space-6);
    }

    .project-card {
      position: relative;
      display: flex;
      min-height: 20rem;
      overflow: hidden;
      flex-direction: column;
      padding: var(--space-8);
      border: var(--border-thin) solid var(--color-card-border);
      border-radius: var(--radius-card);
      background: var(--color-surface);
      transform-style: preserve-3d;
      transition: transform var(--duration-base) var(--ease-out-expo),
        border-color var(--duration-base) var(--ease-standard),
        background var(--duration-base) var(--ease-standard),
        box-shadow var(--duration-base) var(--ease-standard);
      will-change: transform;
    }

    .project-card:hover,
    .project-card:focus-within {
      border-color: var(--color-accent-border);
      background:
        linear-gradient(145deg, rgba(108, 142, 255, 0.11), transparent 48%),
        var(--color-surface);
      box-shadow: var(--shadow-card);
      transform: translateY(var(--translate-card));
    }

    .project-index {
      margin-bottom: auto;
      color: var(--color-accent);
      font-size: var(--font-size-label);
      letter-spacing: var(--letter-spacing-label);
    }

    .project-name {
      margin: var(--space-12) 0 var(--space-3);
      font-family: var(--font-display);
      font-size: var(--font-size-card);
      font-weight: 400;
    }

    .project-description {
      margin: 0 0 var(--space-6);
      color: var(--color-muted);
    }

    .project-footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: var(--space-4);
    }

    .project-links {
      display: flex;
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .text-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: var(--space-8);
      padding: var(--space-1) var(--space-3);
      border: var(--border-thin) solid var(--color-field-border);
      border-radius: var(--radius-pill);
      color: var(--color-muted);
      font-size: var(--font-size-tag);
      letter-spacing: var(--letter-spacing-tag);
      text-transform: uppercase;
      transition: color var(--duration-fast) var(--ease-standard),
        border-color var(--duration-fast) var(--ease-standard),

    /* ================================================================
       Canvas particle system
       ================================================================ */
    function mountHomeView() {
      return initParticleSystem(document.querySelector(".hero-canvas"));
    }

    function initParticleSystem(canvas) {
      const context = canvas.getContext("2d");
      const mouse = { x: Number.POSITIVE_INFINITY, y: Number.POSITIVE_INFINITY };
      const particles = [];
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
      let animationFrame = 0;
      let width = 0;
      let height = 0;
      let pixelRatio = 1;

      function createParticle() {
        let x = 0;
        let y = 0;
        for (let attempt = 0; attempt < CONFIG.particleSpawnAttempts; attempt += 1) {
          x = Math.random() * width;
          y = Math.random() * height;
          const normalizedX = (x - width / 2) / (width * CONFIG.particleClearX);
          const normalizedY = (y - height / 2) / (height * CONFIG.particleClearY);
          if ((normalizedX * normalizedX) + (normalizedY * normalizedY) >= 1) break;
        }
        return {
          x,
          y,
          vx: (Math.random() - 0.5) * CONFIG.particleDrift,
          vy: (Math.random() - 0.5) * CONFIG.particleDrift
        };
      }

      function resizeCanvas() {
        const bounds = canvas.getBoundingClientRect();
        width = bounds.width;
        height = bounds.height;
        pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = width * pixelRatio;
        canvas.height = height * pixelRatio;
        context.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
        if (!particles.length) {
          for (let index = 0; index < CONFIG.particleCount; index += 1) {
            particles.push(createParticle());
          }
        }
      }

      function handlePointerMove(event) {
        mouse.x = event.clientX;
        mouse.y = event.clientY;
      }

      function handlePointerLeave() {
        mouse.x = Number.POSITIVE_INFINITY;
        mouse.y = Number.POSITIVE_INFINITY;
      }

      function updateParticle(particle) {
        const mouseX = particle.x - mouse.x;
        const mouseY = particle.y - mouse.y;
        const mouseDistance = Math.hypot(mouseX, mouseY);

        if (mouseDistance < CONFIG.particleMouseDistance && mouseDistance > 0) {
          const force = (1 - mouseDistance / CONFIG.particleMouseDistance) * CONFIG.particleRepulse;
          particle.vx += (mouseX / mouseDistance) * force;
          particle.vy += (mouseY / mouseDistance) * force;
        }

        const speed = Math.hypot(particle.vx, particle.vy);
        if (speed > CONFIG.particleSpeedLimit) {
          particle.vx = (particle.vx / speed) * CONFIG.particleSpeedLimit;
          particle.vy = (particle.vy / speed) * CONFIG.particleSpeedLimit;
        }

        particle.x += particle.vx;
        particle.y += particle.vy;

        if (particle.x < 0) particle.x = width;
        if (particle.x > width) particle.x = 0;
        if (particle.y < 0) particle.y = height;
        if (particle.y > height) particle.y = 0;
      }

      function drawParticles() {
        context.clearRect(0, 0, width, height);
        context.fillStyle = rootStyles.getPropertyValue("--color-particle");

        particles.forEach((particle, index) => {
          if (!reducedMotion.matches) updateParticle(particle);
          context.beginPath();
          context.arc(particle.x, particle.y, CONFIG.particleRadius, 0, Math.PI * 2);
          context.fill();
          for (let peerIndex = index + 1; peerIndex < particles.length; peerIndex += 1) {
            const peer = particles[peerIndex];
            const distance = Math.hypot(particle.x - peer.x, particle.y - peer.y);
            if (distance < CONFIG.particleLinkDistance) {
              const opacity = 1 - distance / CONFIG.particleLinkDistance;
              context.globalAlpha = opacity;
              context.strokeStyle = rootStyles.getPropertyValue("--color-particle-line");
              context.lineWidth = CONFIG.particleLineWidth;
              context.beginPath();
              context.moveTo(particle.x, particle.y);
              context.lineTo(peer.x, peer.y);
              context.stroke();
              context.globalAlpha = 1;
            }
          }
        });

        if (!reducedMotion.matches) animationFrame = requestAnimationFrame(drawParticles);
      }

      resizeCanvas();
      drawParticles();
      window.addEventListener("resize", resizeCanvas);
      window.addEventListener("pointermove", handlePointerMove, { passive: true });
      document.documentElement.addEventListener("pointerleave", handlePointerLeave);

      return function cleanupParticleSystem() {
        cancelAnimationFrame(animationFrame);
        window.removeEventListener("resize", resizeCanvas);
        window.removeEventListener("pointermove", handlePointerMove);
        document.documentElement.removeEventListener("pointerleave", handlePointerLeave);
      };
    }

    /* ================================================================
       View mounts

    function revealOnScroll(elements) {
      const elementList = Array.from(elements);
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      if (!("IntersectionObserver" in window) || reducedMotion) {
        elementList.forEach((element) => element.classList.add("is-visible"));
        return function cleanupReveal() {};
      }

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            observer.unobserve(entry.target);
          }
        });
      }, { rootMargin: "0px 0px -8% 0px", threshold: 0.05 });

      elementList.forEach((element) => {
        const bounds = element.getBoundingClientRect();
        if (bounds.top < window.innerHeight && bounds.bottom > 0) {
          element.classList.add("is-visible");
        } else {
          observer.observe(element);
        }
      });

      return function cleanupReveal() { observer.disconnect(); };
    }

    function mountAboutView() {
      const elements = document.querySelectorAll("[data-reveal]");
      return revealOnScroll(elements);
    }

    function mountWorkView() {
      const entries = document.querySelectorAll(".timeline-entry");
      return revealOnScroll(entries);
    }

    function mountProjectsView() {
      const cards = document.querySelectorAll(".project-card");
      const cleanups = [];
      const canTilt = window.matchMedia("(hover: hover) and (pointer: fine)").matches
        && !window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      if (!canTilt) return function cleanupProjectsView() {};

      cards.forEach((card) => {
        function handleCardMove(event) {
          const bounds = card.getBoundingClientRect();
          const normalizedX = ((event.clientX - bounds.left) / bounds.width) * 2 - 1;
          const normalizedY = ((event.clientY - bounds.top) / bounds.height) * 2 - 1;
          const rotateX = normalizedY * CONFIG.tiltRotation * -1;
          const rotateY = normalizedX * CONFIG.tiltRotation;
          card.style.transform = `perspective(${CONFIG.tiltPerspective}px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(var(--translate-card))`;
        }

        function handleCardLeave() {
          card.style.transform = "";
        }

        card.addEventListener("mousemove", handleCardMove);
        card.addEventListener("mouseleave", handleCardLeave);
        cleanups.push(() => {
          card.removeEventListener("mousemove", handleCardMove);
          card.removeEventListener("mouseleave", handleCardLeave);
        });
      });

      return function cleanupProjectsView() { cleanups.forEach((cleanup) => cleanup()); };
    }

    function mountContactView() {
      const copyButton = document.querySelector("[data-copy-email]");
      const copyChip = copyButton.querySelector(".copy-chip");
      const form = document.querySelector(".contact-form");
      const formStatus = document.querySelector(".form-status");
      let feedbackFrame = 0;
      let feedbackStarted = 0;

      function restoreCopyFeedback(timestamp) {
        if (!feedbackStarted) feedbackStarted = timestamp;
        if (timestamp - feedbackStarted >= CONFIG.copyFeedbackDuration) {
          copyChip.textContent = "Copy";
          copyButton.setAttribute("aria-label", "Copy email address zpicattoh@gmail.com");
          feedbackStarted = 0;
          return;
        }
        feedbackFrame = requestAnimationFrame(restoreCopyFeedback);
      }

      async function handleCopyEmail() {
        if (!navigator.clipboard?.writeText) {
          formStatus.textContent = "Email: zpicattoh@gmail.com";
          return;
        }
        try {
          await navigator.clipboard.writeText("zpicattoh@gmail.com");
        } catch {
          formStatus.textContent = "Email: zpicattoh@gmail.com";
          return;
        }
        copyChip.textContent = "Copied";
        copyButton.setAttribute("aria-label", "Email copied to clipboard");
        cancelAnimationFrame(feedbackFrame);
        feedbackFrame = requestAnimationFrame(restoreCopyFeedback);
      }

      function handleFormSubmit(event) {
        event.preventDefault();
        const data = new FormData(form);
        const subject = encodeURIComponent(`Website note from ${data.get("name")}`);
        const body = encodeURIComponent(`${data.get("message")}\n\nFrom: ${data.get("name")} <${data.get("email")}>`);
        formStatus.textContent = "Opening your email app...";
        window.location.href = `mailto:zpicattoh@gmail.com?subject=${subject}&body=${body}`;
      }

      copyButton.addEventListener("click", handleCopyEmail);
      form.addEventListener("submit", handleFormSubmit);

      return function cleanupContactView() {
        cancelAnimationFrame(feedbackFrame);
        copyButton.removeEventListener("click", handleCopyEmail);
        form.removeEventListener("submit", handleFormSubmit);
      };
    }

    /* ================================================================
       Navigation behavior
       ================================================================ */
    const nav = document.querySelector(".site-nav");
    const menuToggle = document.querySelector(".menu-toggle");
    const navLinks = document.querySelector(".nav-links");
    const mobileNavQuery = window.matchMedia("(max-width: 48rem)");

    function normalizeHash(hash = window.location.hash) {
      const route = hash || "#/";
      return route === "#" ? "#/" : route;
    }

    function handleNavScroll() {
      const isHome = normalizeHash() === "#/";
      nav.classList.toggle("nav--filled", !isHome || window.scrollY > CONFIG.navScrollThreshold);
    }

    function setMobileNavAccess(isOpen) {
      const shouldHideLinks = mobileNavQuery.matches && !isOpen;
      navLinks.setAttribute("aria-hidden", String(shouldHideLinks));
      navLinks.querySelectorAll("a").forEach((link) => {
        if (shouldHideLinks) link.setAttribute("tabindex", "-1");
        else link.removeAttribute("tabindex");
      });
    }

    function closeMenu() {
      menuToggle.setAttribute("aria-expanded", "false");
      menuToggle.setAttribute("aria-label", "Open menu");
      navLinks.classList.remove("is-open");
      document.body.classList.remove("menu-open");
      setMobileNavAccess(false);
    }

    function handleMenuToggle() {
      const willOpen = menuToggle.getAttribute("aria-expanded") !== "true";
      menuToggle.setAttribute("aria-expanded", String(willOpen));
      menuToggle.setAttribute("aria-label", willOpen ? "Close menu" : "Open menu");
      navLinks.classList.toggle("is-open", willOpen);
      document.body.classList.toggle("menu-open", willOpen);
      setMobileNavAccess(willOpen);
      if (willOpen) navLinks.querySelector("a")?.focus({ preventScroll: true });
    }

    function handleDocumentKeydown(event) {
      if (event.key === "Escape" && menuToggle.getAttribute("aria-expanded") === "true") {
        closeMenu();
        menuToggle.focus({ preventScroll: true });
      }
    }

    function handleNavModeChange() {
      if (!mobileNavQuery.matches) {
        navLinks.setAttribute("aria-hidden", "false");
        navLinks.querySelectorAll("a").forEach((link) => link.removeAttribute("tabindex"));
        return;
      }
      setMobileNavAccess(menuToggle.getAttribute("aria-expanded") === "true");
    }

    function updateActiveLink(route) {
      document.querySelectorAll(".nav-link").forEach((link) => {
        const active = link.getAttribute("href") === route;
        if (active) link.setAttribute("aria-current", "page");
        else link.removeAttribute("aria-current");
      });
    }

    menuToggle.addEventListener("click", handleMenuToggle);
    navLinks.addEventListener("click", (event) => {
      if (event.target.closest(".nav-link")) closeMenu();
    });
    document.addEventListener("keydown", handleDocumentKeydown);
    window.addEventListener("scroll", handleNavScroll, { passive: true });
    if (mobileNavQuery.addEventListener) {
      mobileNavQuery.addEventListener("change", handleNavModeChange);
    } else {
      mobileNavQuery.addListener(handleNavModeChange);
    }
    handleNavModeChange();

    /* ================================================================
       Hash router
       ================================================================ */
    class Router {
      constructor(viewContainer, routes) {
        this.viewContainer = viewContainer;
        this.routes = routes;
        this.currentCleanup = null;
        this.currentRoute = null;
        this.navigationId = 0;
        this.handleHashChange = this.handleHashChange.bind(this);
      }

      start() {
        window.addEventListener("hashchange", this.handleHashChange);
        if (!window.location.hash) {
          window.location.hash = "#/";
          return;
        }
        this.navigate(normalizeHash(), true);
      }

      handleHashChange() {
        this.navigate(normalizeHash());
      }

      waitForExit() {
        return new Promise((resolve) => {
          const handleTransitionEnd = (event) => {
            if (event.target !== this.viewContainer || event.propertyName !== "opacity") return;
            this.viewContainer.removeEventListener("transitionend", handleTransitionEnd);
            resolve();
          };
          this.viewContainer.addEventListener("transitionend", handleTransitionEnd);
          this.viewContainer.className = "view view--exit";
        });
      }

      async navigate(route, initial = false) {
        const matchedRoute = this.routes[route] ? route : "#/";
        if (matchedRoute === this.currentRoute && !initial) return;
        const navigationId = ++this.navigationId;

        if (this.currentCleanup) {
          this.currentCleanup();
          this.currentCleanup = null;
        }

        closeMenu();
        updateActiveLink(matchedRoute);
        handleNavScroll();

        if (!initial && this.viewContainer.innerHTML) {
          await this.waitForExit();
        }

        if (navigationId !== this.navigationId) return;

        const view = this.routes[matchedRoute]();
        this.viewContainer.className = initial ? "view view--active" : "view view--enter";
        this.viewContainer.innerHTML = view.html;
        this.currentRoute = matchedRoute;
        window.scrollTo({ top: 0, behavior: "auto" });

        if (!initial) {
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              this.viewContainer.classList.remove("view--enter");
              this.viewContainer.classList.add("view--active");
              this.viewContainer.focus({ preventScroll: true });
            });
          });
        }

        this.currentCleanup = view.mount ? view.mount() : null;
        document.title = this.createTitle(matchedRoute);
      }

      createTitle(route) {
        const labels = {
          "#/": "Terrence Yang",
          "#/about": "About | Terrence Yang",
          "#/work": "Work | Terrence Yang",
          "#/projects": "Projects | Terrence Yang",
          "#/contact": "Contact | Terrence Yang"
        };
        return labels[route];
      }
    }

    const router = new Router(document.getElementById("view"), {
      "#/": homeView,
      "#/about": aboutView,
      "#/work": workView,
      "#/projects": projectsView,
      "#/contact": contactView
    });

    router.start();
  </script>
</body>
</html>
